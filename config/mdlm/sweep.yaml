program: mdlm_sft.py
method: grid                       # full, reproducible coverage at D2 scale
metric:
  name: eval/loss
  goal: minimize

parameters:
  # --- locked from upstream stages (single-value -> fixed) ---
  training.scheduler:
    value: linear                  # locked at D0
  training.adam_beta2:
    value: 0.98                    # locked from D0a
  training.loss_weight_type:
    value: uniform                 # locked from D0b
  training.time_epsilon:
    value: 1.0e-4                  # locked from D1
  training.warmup_ratio:
    value: 0.03                    # anchored, not under investigation

  # --- D2 axes under investigation ---
  training.learning_rate:
    values: [5.0e-4, 1.0e-3, 2.0e-3]       # expanded lower bound to catch potential instability causes
  
  training.weight_decay:
    values: [0.0, 0.01, 0.05]              # tighter spacing; removed 0.1 as too aggressive