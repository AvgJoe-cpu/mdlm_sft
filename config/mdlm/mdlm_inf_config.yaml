defaults:
  - mdlm_infer_config   # registered InferenceConfig schema (base types + derived interpolations)
  - model: mdlm-owt
  - _self_              # inline values win, applied last

# Hydra configuration - prevent directory changes
hydra:
  output_subdir: null
  run:
    dir: .

model:
  model_name: mdlm-owt
  tokenizer_name: gpt2
  dtype: bfloat16
  device_map: auto

checkpoint_name: toy_run
dataset_key: wrp
split: test
num_samples: 10

response_length: 128
num_steps: 50
batch_size: 2

save_name: inference_results
