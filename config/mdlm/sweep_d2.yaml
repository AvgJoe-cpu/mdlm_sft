# ============================================================ #
# W&B sweep: D2 axes (learning_rate x weight_decay), grid.
#
# Run:
#   wandb sweep config/mdlm/sweep_d2.yaml
#   wandb agent <entity>/<project>/<sweep_id>
#
# The `command` block emits Hydra-style overrides (key=value, no `--`)
# via ${args_no_hyphens}, so @hydra.main composes them directly into the
# config. save_strategy is forced to "no" so concurrent sweep jobs don't
# write into (and clobber) the same checkpoints dir -- we discard models
# during sweeps anyway.
# ============================================================ #
program: mdlm_sft.py
method: grid                       # full, reproducible coverage at D2 scale
metric:
  name: eval/loss
  goal: minimize

command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}            # Hydra-style overrides: key=value (no --)

parameters:
  # --- locked from upstream stages (single-value -> fixed) ---
  training.scheduler:
    value: linear                  # locked at D0
  training.adam_beta2:
    value: 0.98                    # locked from D0a
  training.loss_weight_type:
    value: uniform                 # locked from D0b
  training.time_epsilon:
    value: 1.0e-4                  # locked from D1
  training.warmup_ratio:
    value: 0.03                    # anchored, not under investigation

  # --- discard checkpoints during the sweep (no model saved) ---
  training.save_strategy:
    value: "no"                    # avoid jobs fighting over the checkpoints dir

  # --- D2 axes under investigation ---
  training.learning_rate:
    values: [5.0e-4, 1.0e-3, 2.0e-3]       # expanded lower bound to catch potential instability causes

  training.weight_decay:
    values: [0.0, 0.01, 0.05]              # tighter spacing; removed 0.1 as too aggressive
