program: mdlm_sft.mdlm.mdlm_sft
method: bayes                       # grid would explode (6 axes); bayes converges efficiently
metric:
  name: eval/loss
  goal: minimize

command:
  - ${env}
  - python
  - -m
  - ${program}                      # python -m mdlm_sft.mdlm.mdlm_sft
  - ${args_no_hyphens}              # Hydra-style overrides: key=value (no --)

parameters:
  # --- discard checkpoints during the sweep (no model saved) ---
  training.save_strategy:
    value: "no"                     # avoid jobs fighting over the checkpoints dir

  # --- fixed optimizer/runtime params (not under investigation) ---
  training.adam_beta1:
    value: 0.9
  training.grad_clip:
    value: 1.0
  training.bf16:
    value: true

  # --- D2 axes under investigation ---

  # Learning rate: from-scratch needs a higher/wider band than SFT.
  # Log-uniform so the sampler spends equal effort per order of magnitude.
  training.learning_rate:
    distribution: log_uniform_values
    min: 1.0e-4
    max: 2.0e-3

  # Weight decay: tight spacing around the usual sweet spot.
  training.weight_decay:
    values: [0.0, 0.01, 0.05]

  # Warmup: from-scratch is sensitive to early instability, so probe a bit wider.
  training.warmup_ratio:
    values: [0.01, 0.03, 0.06]

  # Adam beta2: 0.98 stabilizes early training; 0.999 is the classic default.
  training.adam_beta2:
    values: [0.98, 0.999]

  # t-parameter (time_epsilon): controls the lower bound of the noise schedule.
  # Sweep across orders of magnitude.
  training.time_epsilon:
    values: [1.0e-5, 1.0e-4, 1.0e-3]

  # Noise schedule.
  training.scheduler:
    values: [linear, cosine]

  # Loss weighting across timesteps.
  training.loss_weight_type:
    values: [uniform, scheduler]

  # Reproducibility (single value -> fixed)
  seed:
    value: 42