defaults:
  - model: mdlm-owt
  - dataset: wrp
  - _self_

# Hydra configuration - prevent directory changes
hydra:
  output_subdir: null
  run:
    dir: .

model:
  model_name: mdlm-owt
  tokenizer_name: gpt2
  dtype: bfloat16
  device_map: auto

dataset:
  dataset_key: wrp
  num_train_samples: 10000
  num_test_samples: 2500
  max_length: 1024

training:
  num_epochs: 4
  batch_size: 64
  learning_rate: 2e-5
  warmup_ratio: 0.03
  weight_decay: 0.01
  grad_clip: 1.0
  num_workers: 4
  logging_steps: 50
  seed: 42
  adam_beta1: 0.9
  adam_beta2: 0.999
  scheduler: linear
  loss_weight_type: uniform
  time_epsilon: 0.001
  eval_strategy: steps
  eval_steps: 100
  save_strategy: "no"  # Changed from false to "no"
  report_to: "wandb"
  batch_eval_metrics: true
  remove_unused_columns: false
  bf16: true

checkpoint_name: null
run_name: toy_run
seed: 42
